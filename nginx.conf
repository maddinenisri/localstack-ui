# Default nginx config for standalone Docker usage (no Helm).
# In Kubernetes, the Helm ConfigMap overrides this via volumeMount.
upstream localstack {
    server localhost:4566;
    keepalive 8;
}

server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Proxy LocalStack internal API endpoints
    location /_aws/ {
        proxy_pass         http://localstack;
        proxy_http_version 1.1;
        proxy_set_header   Host              localhost;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   Connection        "";

        proxy_connect_timeout 2s;
        proxy_read_timeout    10s;
        proxy_send_timeout    10s;

        proxy_intercept_errors on;
        error_page 502 503 504 = @localstack_unavailable;

        add_header Access-Control-Allow-Origin  * always;
        add_header Access-Control-Allow-Methods "GET, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type" always;

        if ($request_method = OPTIONS) {
            return 204;
        }
    }

    location /_localstack/ {
        proxy_pass         http://localstack;
        proxy_http_version 1.1;
        proxy_set_header   Host              localhost;
        proxy_set_header   Connection        "";

        proxy_connect_timeout 2s;
        proxy_read_timeout    10s;

        proxy_intercept_errors on;
        error_page 502 503 504 = @localstack_unavailable;
    }

    location @localstack_unavailable {
        default_type application/json;
        add_header Access-Control-Allow-Origin * always;
        return 503 '{"error":"localstack_unavailable","message":"LocalStack is still starting — retrying automatically"}';
    }

    # Serve static UI (SPA fallback)
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        add_header X-Frame-Options SAMEORIGIN;
        add_header X-Content-Type-Options nosniff;
    }

    location = /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}
