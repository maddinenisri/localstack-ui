apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "localstack.fullname" . }}-nginx
  namespace: {{ .Release.Namespace | quote }}
  labels:
    {{- include "localstack.labels" . | nindent 4 }}
data:
  localstack-ui.conf: |
    # Upstream block lets nginx start cleanly even if LocalStack is not yet
    # listening on :{{ .Values.service.localstackPort }}.  Without this, a bare
    # proxy_pass to a down host causes nginx itself to refuse to start.
    upstream localstack {
        server localhost:{{ .Values.service.localstackPort }};
        keepalive 8;
    }

    server {
        listen {{ .Values.ui.port }};
        server_name _;

        root /usr/share/nginx/html;
        index index.html;

        # ── Proxy LocalStack internal API endpoints ─────────────────
        # Both containers share the pod network namespace, so
        # localhost:{{ .Values.service.localstackPort }} resolves to the LocalStack
        # container with no extra network hop and no CORS concern.
        #
        # During the brief window while LocalStack is still starting up,
        # nginx returns the JSON error below instead of a raw 502 page.
        location /_aws/ {
            proxy_pass         http://localstack;
            proxy_http_version 1.1;
            proxy_set_header   Host              localhost;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   Connection        "";
            # Strip Origin/Referer — LocalStack rejects browser requests with these set
            proxy_set_header   Origin            "";
            proxy_set_header   Referer           "";

            # Short timeouts — if LocalStack is down we want a fast, clean error
            # back to the UI rather than a hanging request.
            proxy_connect_timeout 2s;
            proxy_read_timeout    10s;
            proxy_send_timeout    10s;

            # Return a JSON 503 while LocalStack is starting up.
            # The UI polls every 5 s (auto-refresh) so it will recover automatically.
            proxy_intercept_errors on;
            error_page 502 503 504 = @localstack_unavailable;

            add_header Access-Control-Allow-Origin  * always;
            add_header Access-Control-Allow-Methods "GET, DELETE, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Content-Type" always;

            if ($request_method = OPTIONS) {
                return 204;
            }
        }

        location /_localstack/ {
            proxy_pass         http://localstack;
            proxy_http_version 1.1;
            proxy_set_header   Host              localhost;
            proxy_set_header   Connection        "";
            proxy_set_header   Origin            "";
            proxy_set_header   Referer           "";

            proxy_connect_timeout 2s;
            proxy_read_timeout    10s;

            proxy_intercept_errors on;
            error_page 502 503 504 = @localstack_unavailable;

            add_header Access-Control-Allow-Origin  * always;
            add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Content-Type" always;

            if ($request_method = OPTIONS) {
                return 204;
            }
        }

        # Proxy standard AWS API calls (SNS, SQS) to LocalStack.
        location ~ ^/_aws_api/([^/]+)/(.*) {
            proxy_pass         http://localstack/$2?$args;
            proxy_http_version 1.1;
            proxy_set_header   Host              $1.us-east-1.localhost.localstack.cloud;
            proxy_set_header   Connection        "";
            proxy_set_header   Origin            "";
            proxy_set_header   Referer           "";

            proxy_connect_timeout 2s;
            proxy_read_timeout    10s;
            proxy_send_timeout    10s;

            proxy_intercept_errors on;
            error_page 502 503 504 = @localstack_unavailable;

            add_header Access-Control-Allow-Origin  * always;
            add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Content-Type" always;

            if ($request_method = OPTIONS) {
                return 204;
            }
        }

        # Named location returned when LocalStack has not yet bound its port.
        # Returns valid JSON so the UI can display a human-readable status
        # instead of an opaque network error.
        location @localstack_unavailable {
            default_type application/json;
            add_header Access-Control-Allow-Origin * always;
            return 503 '{"error":"localstack_unavailable","message":"LocalStack is still starting — retrying automatically"}';
        }

        # ── Serve static UI ──────────────────────────────────────────
        location / {
            try_files $uri $uri/ /index.html;
            add_header Cache-Control "no-store, no-cache, must-revalidate";
            add_header X-Frame-Options SAMEORIGIN;
            add_header X-Content-Type-Options nosniff;
        }

        # Health check endpoint — reports nginx-up, not LocalStack-up.
        # The Pod readinessProbe on the localstack container gates traffic
        # until LocalStack itself is ready.
        location = /healthz {
            access_log off;
            return 200 "ok\n";
            add_header Content-Type text/plain;
        }
    }
