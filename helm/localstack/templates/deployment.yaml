apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "localstack.fullname" . }}
  namespace: {{ .Release.Namespace | quote }}
  labels:
    {{- include "localstack.labels" . | nindent 4 }}
spec:
  # Always 1 replica — LocalStack holds in-memory state.
  # Scaling to >1 would split message state across pods.
  replicas: 1
  selector:
    matchLabels:
      {{- include "localstack.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "localstack.selectorLabels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "localstack.serviceAccountName" . }}

      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}

      # ── NO initContainer ────────────────────────────────────────────
      # InitContainers run BEFORE any main container starts.
      # In a sidecar pod, LocalStack IS a main container — it has not
      # started yet when initContainers execute, so any nc/wget probe
      # against localhost:4566 would loop forever waiting for a port
      # that will never open during that phase.
      #
      # Startup ordering is handled instead by:
      #   1. nginx `upstream` block in the ConfigMap — nginx starts
      #      cleanly even if LocalStack's port is not yet bound.
      #   2. `error_page 502 503 504` in the nginx ConfigMap — returns
      #      a clean JSON 503 to the UI while LocalStack is warming up.
      #   3. readinessProbe on the localstack container — Kubernetes will
      #      not mark the Pod Ready (and will not route Ingress traffic)
      #      until LocalStack passes its /_localstack/health check.
      #   4. UI auto-refresh (every 5 s) recovers without user action.

      containers:
        # ── Container 1: LocalStack ──────────────────────────────────
        - name: localstack
          image: "{{ .Values.localstack.image.repository }}:{{ .Values.localstack.image.tag }}"
          imagePullPolicy: {{ .Values.localstack.image.pullPolicy }}
          ports:
            - name: gateway
              containerPort: {{ .Values.service.localstackPort }}
              protocol: TCP
          env:
            - name: SERVICES
              value: {{ .Values.localstack.services | quote }}
            - name: DEBUG
              value: {{ .Values.localstack.debug | quote }}
            - name: PERSISTENCE
              value: {{ if .Values.localstack.persistence.enabled }}"1"{{ else }}"0"{{ end }}
            - name: AWS_DEFAULT_REGION
              value: "us-east-1"
            - name: AWS_ACCESS_KEY_ID
              value: "test"
            - name: AWS_SECRET_ACCESS_KEY
              value: "test"
          livenessProbe:
            httpGet:
              path: /_localstack/health
              port: gateway
            initialDelaySeconds: 20
            periodSeconds: 15
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /_localstack/health
              port: gateway
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
          {{- with .Values.localstack.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- if .Values.localstack.persistence.enabled }}
          volumeMounts:
            - name: localstack-data
              mountPath: /var/lib/localstack
          {{- end }}

        # ── Container 2: Inspector UI (sidecar) ─────────────────────
        - name: localstack-ui
          image: "{{ .Values.ui.image.repository }}:{{ .Values.ui.image.tag }}"
          imagePullPolicy: {{ .Values.ui.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.ui.port }}
              protocol: TCP
          # nginx.conf is injected from ConfigMap — no image rebuild needed
          # to change proxy settings or ports.
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/conf.d
              readOnly: true
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
            failureThreshold: 3
          {{- with .Values.ui.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}

      volumes:
        - name: nginx-config
          configMap:
            name: {{ include "localstack.fullname" . }}-nginx
        {{- if .Values.localstack.persistence.enabled }}
        - name: localstack-data
          persistentVolumeClaim:
            claimName: {{ include "localstack.fullname" . }}-data
        {{- end }}

      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
