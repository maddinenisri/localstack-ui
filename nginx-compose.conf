# nginx config for docker-compose (separate containers, not a shared pod).
# The only difference from nginx.conf is the upstream points to the
# "localstack" service name instead of localhost.
upstream localstack {
    server localstack:4566;
    keepalive 8;
}

server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location /_aws/ {
        proxy_pass         http://localstack;
        proxy_http_version 1.1;
        proxy_set_header   Host              localhost;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   Connection        "";
        # Strip Origin/Referer — LocalStack rejects browser requests with these set
        proxy_set_header   Origin            "";
        proxy_set_header   Referer           "";

        proxy_connect_timeout 2s;
        proxy_read_timeout    10s;
        proxy_send_timeout    10s;

        proxy_intercept_errors on;
        error_page 502 503 504 = @localstack_unavailable;

        add_header Access-Control-Allow-Origin  * always;
        add_header Access-Control-Allow-Methods "GET, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type" always;

        if ($request_method = OPTIONS) {
            return 204;
        }
    }

    location /_localstack/ {
        proxy_pass         http://localstack;
        proxy_http_version 1.1;
        proxy_set_header   Host              localhost;
        proxy_set_header   Connection        "";
        proxy_set_header   Origin            "";
        proxy_set_header   Referer           "";

        proxy_connect_timeout 2s;
        proxy_read_timeout    10s;

        proxy_intercept_errors on;
        error_page 502 503 504 = @localstack_unavailable;

        add_header Access-Control-Allow-Origin  * always;
        add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type" always;

        if ($request_method = OPTIONS) {
            return 204;
        }
    }

    # Proxy standard AWS API calls (SNS, SQS, etc.) to LocalStack.
    # The UI uses /_aws_api/{service}/ which maps to LocalStack's root.
    location ~ ^/_aws_api/([^/]+)/(.*) {
        proxy_pass         http://localstack/$2?$args;
        proxy_http_version 1.1;
        proxy_set_header   Host              $1.us-east-1.localhost.localstack.cloud;
        proxy_set_header   Connection        "";
        proxy_set_header   Origin            "";
        proxy_set_header   Referer           "";

        proxy_connect_timeout 2s;
        proxy_read_timeout    10s;
        proxy_send_timeout    10s;

        proxy_intercept_errors on;
        error_page 502 503 504 = @localstack_unavailable;

        add_header Access-Control-Allow-Origin  * always;
        add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type" always;

        if ($request_method = OPTIONS) {
            return 204;
        }
    }

    location @localstack_unavailable {
        default_type application/json;
        add_header Access-Control-Allow-Origin * always;
        return 503 '{"error":"localstack_unavailable","message":"LocalStack is still starting — retrying automatically"}';
    }

    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        add_header X-Frame-Options SAMEORIGIN;
        add_header X-Content-Type-Options nosniff;
    }

    location = /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}
